<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Somatic Core</title>
    <style>
        :root {
            --bg: #050605;
            --accent: #F5A623;
            --core-size: 260px;
            --blur: 60px;
            --speed: 6s;
            --opacity: 0.6;
        }

        /* Режимы */
        .mode-morning { --accent: #FFD700; --speed: 5s; --opacity: 0.7; }
        .mode-digest { --accent: #4CAF50; --speed: 10s; --opacity: 0.5; }
        .mode-hunger { --accent: #2196F3; --speed: 14s; --opacity: 0.4; }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 2s ease;
        }

        /* Фоновый свет */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vw;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.05;
            filter: blur(100px);
            z-index: 0;
            transition: all 2s ease;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Центральный объект */
        .core-container {
            position: relative;
            width: var(--core-size);
            height: var(--core-size);
            cursor: pointer;
        }

        .core-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.1), transparent);
            box-shadow: 
                0 0 var(--blur) rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.02);
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .core-glow {
            position: absolute;
            inset: -20px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(var(--blur));
            opacity: var(--opacity);
            animation: pulse var(--speed) infinite ease-in-out;
            transition: all 2s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: calc(var(--opacity) * 0.7); }
            40% { transform: scale(1.15); opacity: var(--opacity); }
            60% { transform: scale(1.15); opacity: var(--opacity); }
        }

        /* Навигация (Mobile-first Bottom Bar) */
        nav {
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 2;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 80px;
        }

        .nav-btn.active {
            color: var(--accent);
        }

        .nav-icon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        /* Декоративные метки времени */
        .time-display {
            position: absolute;
            top: calc(40px + env(safe-area-inset-top));
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.3em;
            opacity: 0.4;
        }

        .info-pill {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 11px;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
        }

        .info-pill.show { opacity: 1; }

    </style>
</head>
<body class="mode-morning">

<div class="ambient-glow" id="ambient"></div>
<div class="time-display" id="clock">00:00</div>

<main>
    <div class="core-container" id="core">
        <div class="core-glow" id="glow"></div>
        <div class="core-layer"></div>
    </div>
    <div class="info-pill" id="pill">ВДОХ — ЗАДЕРЖКА — ВЫДОХ</div>
</main>

<nav>
    <button class="nav-btn active" onclick="setMode('morning', this)">
        <div class="nav-icon"></div>
        <span>УТРО</span>
    </button>
    <button class="nav-btn" onclick="setMode('digest', this)">
        <div class="nav-icon"></div>
        <span>ПОСЛЕ ЕДЫ</span>
    </button>
    <button class="nav-btn" onclick="setMode('hunger', this)">
        <div class="nav-icon"></div>
        <span>ГОЛОД</span>
    </button>
</nav>

<script>
    const body = document.body;
    const pill = document.getElementById('pill');
    const clock = document.getElementById('clock');
    
    // Обновление часов
    function updateClock() {
        const now = new Date();
        clock.innerText = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function setMode(mode, btn) {
        // Сброс классов
        body.className = 'mode-' + mode;
        
        // Активная кнопка
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Текст подсказки
        const hints = {
            morning: "ПРОБУЖДЕНИЕ МЕТАБОЛИЗМА",
            digest: "АКТИВАЦИЯ ПИЩЕВАРЕНИЯ (4-7-8)",
            hunger: "СНИЖЕНИЕ КОРТИЗОЛА И ГИРЕЛИНА"
        };
        pill.innerText = hints[mode];
        pill.classList.add('show');
        setTimeout(() => pill.classList.remove('show'), 4000);

        // Haptic feedback
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // Интерактив с ядром
    document.getElementById('core').addEventListener('click', () => {
        const glow = document.getElementById('glow');
        glow.style.transform = 'scale(1.3)';
        if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
        setTimeout(() => glow.style.transform = '', 500);
    });
</script>

</body>
</html>
